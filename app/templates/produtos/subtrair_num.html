<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtrair</title>
</head>
<body>
    <h1>Subtrair</h1>
    <form action="{{ url_for('produtos.subtrair' ) }}" method="post">
        <label for="subtrair_num">Quanto quer subtrair ao produto?</label>
        <input type="hidden" name="codigo" value="{{codigo}}">
        <input type="number" name="subtrair_num" id="somar_num">
        <button type="submit">Enviar</button>
    </form>
    
</body>
</html>
