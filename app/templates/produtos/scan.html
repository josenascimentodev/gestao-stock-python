<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escanear produto</title>
</head>
<body>
    <h1>Escanear Produto</h1>
    <form action="{{ url_for( 'produtos.verificar' ) }}" method="post">
        <label for="codigo">Digite o codigo do produto:</label>
        <input type="text" name="codigo" id="codigo">
        <button type="submit">Enviar codigo</button>
    </form>
    {% if erro %}
        <p>{{ erro }}</p>
    {% endif %}
    <form action="{{ url_for('home.index' ) }}">
        <button type="submit">Voltar a pagina inicial</button>
    </form>
</body>
</html>
