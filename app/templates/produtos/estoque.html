<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
</head>
<body>
    <h1>Estoque</h1>
    <ul>
    {% for produto in estoque %}
        <li>{{ produto[1] }}</li>
        <li>{{ produto[2] }}</li>
        <li>{{ produto[3] }}</li>
        <li>{{ produto[4] }}</li>
        <li>{{ produto[5] }}</li>
    {%else%}
        <li>Estoque vazio</li>
    {% endfor %}
    </ul>
    <form action="{{ url_for('home.index' ) }}">
        <button type="submit">Voltar a pagina inicial</button>
    </form>
    
</body>
</html>
